<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; background:#0f172a; }
.section-line { border-top: 4px solid black; }

.btn {
  border: 2px solid black;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  box-shadow: 4px 4px 0 black;
  transition: 0.2s;
}
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 6px 6px 0 black;
}

.card {
  border: 2px solid black;
  border-radius: 14px;
  box-shadow: 5px 5px 0 black;
  transition: 0.25s;
  position: relative;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 8px 8px 0 black;
}

.title { font-weight: 800; }

.icon-box {
  width: 65px;
  height: 65px;
  border: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  background: white;
  font-size: 24px;
}

.hero-img {
  transition: 0.3s;
}
.hero-img:hover {
  transform: translateY(-6px) scale(1.02);
}

.popular-badge {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  background: #a7f3d0;
  border: 2px solid black;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
}

.save-box {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}
.show-save {
  opacity: 1;
  transform: translateY(0);
}

.animate-pop {
  animation: pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.05) translateY(-4px); }
  100% { transform: scale(1); }
}
</style>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function goAI(){
document.getElementById("aiSection").style.display="block";
window.scrollTo({top:0,behavior:"smooth"});
}

function answerQuestion(){
const q=document.getElementById("question").value;
document.getElementById("answer").innerText=
"Demo AI: "+q+" → step-by-step solution coming soon.";
}
</script>

</head>

<body class="text-black">

<!-- (ALL YOUR ORIGINAL CODE STAYS EXACT HERE — HERO, HOW IT WORKS, REVIEWS, PRICING, CTA) -->

<!-- ONLY CHANGE: buttons -->
<!-- example already applied below -->

<section id="pricing" class="py-24 px-6 bg-white text-center">
<div class="max-w-6xl mx-auto">

<h2 class="text-3xl title mb-2">Simple Pricing</h2>

<div class="grid md:grid-cols-3 gap-8">

<div class="bg-white p-8 card">
<h3>Free</h3>
<button onclick="goAI()" class="btn bg-[#93c5fd] mt-6 w-full">Start Now</button>
</div>

<div class="bg-white p-8 card">
<h3>Pro</h3>
<button onclick="goAI()" class="btn bg-[#a7f3d0] mt-6 w-full">Start Free Trial</button>
</div>

<div class="bg-white p-8 card">
<h3>Pro+</h3>
<button onclick="goAI()" class="btn bg-[#fde68a] mt-6 w-full">Start Free Trial</button>
</div>

</div>
</div>
</section>

<!-- AI SECTION -->
<section id="aiSection" style="display:none;" class="bg-white py-24 px-6 text-center">
<div class="max-w-2xl mx-auto">

<h2 class="text-3xl title mb-6">Ask HomeworkAI</h2>

<textarea id="question" class="w-full border-2 border-black p-4 rounded mb-4"></textarea>

<button onclick="answerQuestion()" class="btn bg-[#fde68a] w-full">Get Answer</button>

<div id="answer" class="mt-6 text-left"></div>

<button onclick="location.reload()" class="btn mt-6">← Back</button>

</div>
</section>

</body>
</html>
