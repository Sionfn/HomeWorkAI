<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; background:#0f172a; }
.section-line { border-top: 4px solid black; }

.btn {
  border: 2px solid black;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  box-shadow: 4px 4px 0 black;
  transition: 0.2s;
}
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 6px 6px 0 black;
}

.card {
  border: 2px solid black;
  border-radius: 14px;
  box-shadow: 5px 5px 0 black;
  transition: 0.25s;
  position: relative;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 8px 8px 0 black;
}

.title { font-weight: 800; }

.icon-box {
  width: 65px;
  height: 65px;
  border: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  background: white;
  font-size: 24px;
}

.hero-img {
  transition: 0.3s;
}
.hero-img:hover {
  transform: translateY(-6px) scale(1.02);
}

.popular-badge {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  background: #a7f3d0;
  border: 2px solid black;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
}

.save-box {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s ease;
}
.show-save {
  opacity: 1;
  transform: translateY(0);
}

.animate-pop {
  animation: pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.05) translateY(-4px); }
  100% { transform: scale(1); }
}

/* AI PAGE */
#aiPage {
  display:none;
  background:#0f172a;
  color:white;
  min-height:100vh;
  padding:40px;
}

.ai-container {
  max-width:700px;
  margin:auto;
}

.ai-input {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid black;
  color:black;
}

.ai-output {
  margin-top:20px;
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  border:2px solid black;
}
</style>
</head>

<body class="text-black" id="mainSite">

<!-- HEADER -->
<div class="flex justify-between items-center px-10 py-5 bg-[#c4b5fd] border-b-4 border-black">
  <div class="font-bold text-lg">✦ HomeWorkAI</div>

  <button onclick="alert('Login coming soon')" class="btn flex items-center gap-2 bg-white">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20">
    Login with Google
  </button>
</div>

<!-- HERO -->
<section class="py-24 px-6 bg-white">
<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

<div>
<h1 class="text-5xl title">
Stuck on <span class="text-[#60a5fa]">Homework?</span><br>
We’ve got your back.
</h1>

<p class="mt-6 text-gray-600 text-lg">
Instant answers with step-by-step explanations.
Better than tutors and teachers.
</p>

<button onclick="scrollToSection('pricing')" class="btn bg-[#c4b5fd] mt-8">
Get Started Free
</button>

<p class="text-green-500 mt-3">✔ 10 free questions daily</p>
</div>

<div>
<img src="https://raw.githubusercontent.com/Sionfn/HomeWorkAI/refs/heads/main/KpNCqHlKPhjoLrIsecGasT6Q6TlWXUTglR8TbrzymygH2u-bPmPOtfDxYbVBZYXFRZfC3NCD3BUURscaJHB6woNIFKxnzgpsB956vPfj2m2Nk2VvXGRzrZnhQ13303yTZOp6X2nNdwQNNDRGjA-TGzQZ07E8uFeca4K0h1u8rvb1rG8y6sq_otVtBpWaXCOk.jpeg"
class="rounded-lg w-full object-cover hero-img border-2 border-black">

<div class="mt-3 bg-[#bbf7d0] px-3 py-1 inline-block border-2 border-black">
Powered by OpenAI • Trusted by students
</div>
</div>

</div>
</section>

<div class="section-line"></div>

<!-- (EVERYTHING ELSE UNCHANGED ABOVE PRICING) -->

<!-- PRICING BUTTONS FIX -->
<!-- ONLY CHANGE = onclick -->

<button onclick="goAI()" class="btn bg-[#93c5fd] mt-6 w-full">Start Now</button>
<button onclick="goAI()" class="btn bg-[#a7f3d0] mt-6 w-full">Start Free Trial</button>
<button onclick="goAI()" class="btn bg-[#fde68a] mt-6 w-full">Start Free Trial</button>

<!-- CTA BUTTON -->
<button onclick="goAI()" class="btn bg-[#fde68a] mt-6">✦ Start Learning Now</button>

<!-- AI PAGE -->
<div id="aiPage">
<div class="ai-container">

<h2 class="text-3xl mb-6">Ask HomeworkAI</h2>

<textarea id="question" class="ai-input" placeholder="Type your question..."></textarea>

<button onclick="answerQuestion()" class="btn mt-4 w-full bg-[#fde68a]">Get Answer</button>

<div id="answer" class="ai-output hidden"></div>

<button onclick="goBack()" class="btn mt-4 w-full">← Back</button>

</div>
</div>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function goAI(){
document.getElementById("mainSite").style.display="none";
document.getElementById("aiPage").style.display="block";
}

function goBack(){
document.getElementById("aiPage").style.display="none";
document.getElementById("mainSite").style.display="block";
}

function answerQuestion(){
const q = document.getElementById("question").value;
const out = document.getElementById("answer");

out.classList.remove("hidden");
out.innerText = "AI Answer (demo): " + q + " → Step-by-step explanation coming soon.";
}

function setBilling(type){
const pro = document.getElementById("proPrice");
const plus = document.getElementById("proPlusPrice");
const savePro = document.getElementById("savePro");
const savePlus = document.getElementById("savePlus");

if(type==="yearly"){
  pro.innerText="$100/year";
  plus.innerText="$150/year";
  setTimeout(()=>savePro.classList.add("show-save"),200);
  setTimeout(()=>savePlus.classList.add("show-save"),300);
}else{
  pro.innerText="$10/mo";
  plus.innerText="$20/mo";
  savePro.classList.remove("show-save");
  savePlus.classList.remove("show-save");
}
}
</script>

</body>
</html>
<!-- deploy -->
