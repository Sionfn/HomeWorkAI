<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-weight: bold;
}

.login {
  background: white;
  color: black;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.login:hover {
  transform: scale(1.05);
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 1s ease;
}

.hero h1 {
  font-size: 3.5rem;
}

.hero span {
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: #94a3b8;
}

/* BUTTONS */
button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.primary {
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
}

.primary:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(59,130,246,0.5);
}

.secondary {
  background: transparent;
  border: 1px solid #475569;
  color: white;
}

/* MAIN CARD */
.main {
  display: flex;
  justify-content: center;
}

.card {
  width: 90%;
  max-width: 700px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.6s ease;
}

textarea {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
}

.ask {
  width: 100%;
  margin-top: 10px;
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
}

.response {
  margin-top: 15px;
  padding: 15px;
  background: #0f172a;
  border-radius: 12px;
  white-space: pre-wrap;
}

/* PRICING */
.pricing {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 80px 20px;
  flex-wrap: wrap;
}

.plan {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  width: 250px;
  text-align: center;
  transition: 0.3s;
}

.plan:hover {
  transform: translateY(-10px);
}

.price {
  font-size: 24px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0}
  to {opacity:1}
}

@keyframes fadeInUp {
  from {
    opacity:0;
    transform:translateY(20px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">HomeWorkAI</div>
  <div class="login">Login</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AI That Solves Your <span>Homework</span></h1>
  <p>Step-by-step answers instantly. Learn smarter, not harder.</p>
</div>

<!-- MAIN -->
<div class="main">
  <div class="card">
    <textarea id="question" rows="4" placeholder="Ask any homework question..."></textarea>
    <button class="ask" onclick="askAI()">Ask AI</button>
    <div id="response" class="response"></div>
  </div>
</div>

<!-- PRICING -->
<div class="pricing">

  <div class="plan">
    <h3>Free</h3>
    <div class="price">$0</div>
    <p>10 questions/day</p>
    <button onclick="selectPlan('free')">Start Free</button>
  </div>

  <div class="plan">
    <h3>Pro</h3>
    <div class="price">$9/mo</div>
    <p>Unlimited questions</p>
    <button onclick="selectPlan('pro')" class="primary">Upgrade</button>
  </div>

  <div class="plan">
    <h3>Pro+</h3>
    <div class="price">$19/mo</div>
    <p>Best AI model</p>
    <button onclick="selectPlan('proplus')" class="primary">Go Pro+</button>
  </div>

</div>

<script>
let currentPlan = "free";

function selectPlan(plan) {
  currentPlan = plan;

  alert(
    plan === "free"
      ? "You are on the Free plan"
      : "Upgrade successful (demo). " + plan.toUpperCase() + " activated 🚀"
  );
}

function getToday() {
  return new Date().toISOString().split("T")[0];
}

function getUsage() {
  return JSON.parse(localStorage.getItem("usage")) || {};
}

function saveUsage(data) {
  localStorage.setItem("usage", JSON.stringify(data));
}

async function askAI() {
  const question = document.getElementById("question").value;
  const today = getToday();
  let usage = getUsage();

  if (!usage[today]) usage[today] = 0;

  const limit = currentPlan === "free" ? 10 : Infinity;

  if (usage[today] >= limit) {
    document.getElementById("response").innerText =
      "⚠️ Daily limit reached. Upgrade for unlimited.";
    return;
  }

  document.getElementById("response").innerText = "Thinking...";

  const res = await fetch("/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();

  usage[today]++;
  saveUsage(usage);

  document.getElementById("response").innerText =
    data.answer + `\n\n(${usage[today]}/${limit === Infinity ? "∞" : limit} used today)`;
}
</script>

</body>
</html>
<!-- deploy -->
