<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-50 text-slate-900">

<!-- NAV -->
<div class="flex justify-between items-center px-8 py-4 bg-white border-b">
  <div class="font-semibold text-lg">HomeWorkAI</div>
  <button class="bg-black text-white px-4 py-2 rounded-lg">Login</button>
</div>

<!-- HERO -->
<section class="text-center py-24 px-4 max-w-3xl mx-auto">
  <h1 class="text-4xl font-semibold leading-tight">
    AI that helps you actually understand your homework
  </h1>

  <p class="mt-4 text-slate-600 text-lg">
    Step-by-step answers. Instant help. Better grades.
  </p>

  <button onclick="scrollToTool()" class="mt-6 bg-blue-600 text-white px-6 py-3 rounded-xl">
    Get Started
  </button>
</section>

<!-- TOOL -->
<section id="tool" class="max-w-2xl mx-auto px-4">
  <div class="bg-white border rounded-2xl p-6 shadow-sm">

    <textarea id="question"
      class="w-full border rounded-lg p-3"
      placeholder="Ask any homework question..."></textarea>

    <button onclick="askAI()"
      class="w-full mt-3 bg-blue-600 text-white py-3 rounded-xl">
      Ask AI
    </button>

    <div id="response"
      class="mt-4 bg-slate-100 p-4 rounded-lg text-sm">
    </div>

  </div>
</section>

<!-- FEATURES -->
<section class="max-w-5xl mx-auto py-20 grid grid-cols-1 md:grid-cols-3 gap-6 px-4">

  <div class="bg-white border rounded-xl p-6 text-center">
    <h3 class="font-semibold">Instant Answers</h3>
    <p class="text-slate-600 mt-2">No waiting. Just results.</p>
  </div>

  <div class="bg-white border rounded-xl p-6 text-center">
    <h3 class="font-semibold">Step-by-step</h3>
    <p class="text-slate-600 mt-2">Understand everything.</p>
  </div>

  <div class="bg-white border rounded-xl p-6 text-center">
    <h3 class="font-semibold">All subjects</h3>
    <p class="text-slate-600 mt-2">Math, science, history.</p>
  </div>

</section>

<!-- PRICING -->
<section class="max-w-5xl mx-auto py-20 grid grid-cols-1 md:grid-cols-2 gap-6 px-4">

  <div class="bg-white border rounded-2xl p-6">
    <h3 class="text-xl font-semibold">Free</h3>
    <p class="text-3xl mt-2">$0</p>
    <p class="text-slate-600 mt-2">10 questions/day</p>
    <button class="mt-4 w-full bg-black text-white py-3 rounded-xl">
      Start Free
    </button>
  </div>

  <div class="bg-white border-2 border-blue-600 rounded-2xl p-6">
    <h3 class="text-xl font-semibold">Pro</h3>
    <p class="text-3xl mt-2">$9/mo</p>
    <p class="text-slate-600 mt-2">Unlimited + better AI</p>
    <button class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl">
      Upgrade
    </button>
  </div>

</section>

<script>
function scrollToTool(){
  document.getElementById("tool").scrollIntoView({behavior:"smooth"});
}

async function askAI() {
  const question = document.getElementById("question").value;

  document.getElementById("response").innerText = "Thinking...";

  const res = await fetch("/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();

  document.getElementById("response").innerText = data.answer;
}
</script>

</body>
</html>
<!-- deploy -->
