<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 700;
}

.hero p {
  color: #94a3b8;
  font-size: 1.2rem;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

textarea {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  font-weight: bold;
  cursor: pointer;
}

.response {
  margin-top: 15px;
  padding: 15px;
  background: #0f172a;
  border-radius: 12px;
}

.login-btn {
  margin-top: 20px;
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="hero">
  <h1>HomeWorkAI</h1>
  <p>Your AI tutor for homework, tests, and learning</p>
</div>

<div class="container">
  <div class="card">

    <button class="login-btn">Continue with Google</button>

    <textarea id="question" rows="4" placeholder="Ask your question..."></textarea>
    <button onclick="askAI()">Ask</button>

    <div id="response" class="response">Answer will appear here...</div>

  </div>
</div>

<script>
async function askAI() {
  const question = document.getElementById("question").value;

  document.getElementById("response").innerText = "Thinking...";

  const res = await fetch("/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();

  document.getElementById("response").innerText = data.answer;
}
</script>

</body>
</html>
