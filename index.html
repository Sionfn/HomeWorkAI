<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.login {
  background: white;
  color: black;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 20px;
}

.hero h1 {
  font-size: 3.5rem;
  font-weight: 700;
}

.hero span {
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: #94a3b8;
  margin-top: 10px;
  font-size: 1.2rem;
}

/* IMAGE */
.hero img {
  width: 100%;
  max-width: 700px;
  border-radius: 20px;
  margin-top: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.card {
  width: 90%;
  max-width: 700px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* INPUT */
textarea {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 16px;
  resize: none;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

/* RESPONSE */
.response {
  margin-top: 15px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  min-height: 60px;
  white-space: pre-wrap;
}

/* PRICING */
.pricing {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 60px 20px;
  flex-wrap: wrap;
}

.plan {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  width: 260px;
  text-align: center;
}

.plan h3 {
  margin-bottom: 10px;
}

.price {
  font-size: 24px;
  margin: 10px 0;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">HomeWorkAI</div>
  <div class="login">Login</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Study Smarter with <span>AI</span></h1>
  <p>Instant homework help, step-by-step explanations, and smarter learning.</p>

  <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">
</div>

<!-- MAIN -->
<div class="container">
  <div class="card">

    <textarea id="question" rows="4" placeholder="Ask any homework question..."></textarea>
    <button onclick="askAI()">Ask AI</button>

    <div id="response" class="response">Your answer will appear here...</div>

  </div>
</div>

<!-- PRICING -->
<div class="pricing">
  <div class="plan">
    <h3>Free</h3>
    <div class="price">$0</div>
    <p>10 questions/day</p>
  </div>

  <div class="plan">
    <h3>Pro</h3>
    <div class="price">$9/mo</div>
    <p>Unlimited questions</p>
  </div>

  <div class="plan">
    <h3>Pro+</h3>
    <div class="price">$19/mo</div>
    <p>Best AI + priority</p>
  </div>
</div>

<script>
async function askAI() {
  const question = document.getElementById("question").value;

  document.getElementById("response").innerText = "Thinking...";

  const res = await fetch("/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();

  document.getElementById("response").innerText = data.answer;
}
</script>

</body>
</html>
<!-- deploy -->
