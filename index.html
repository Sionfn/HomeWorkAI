<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeWorkAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white h-screen flex">

<!-- SIDEBAR -->
<div class="w-64 bg-slate-100 border-r flex flex-col p-4">
  <div class="text-lg font-semibold mb-4">HomeWorkAI</div>

  <button onclick="newChat()" class="bg-black text-white py-2 rounded-lg">
    + New Chat
  </button>

  <div id="history" class="mt-4 text-sm text-slate-600">
    <!-- chat history -->
  </div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

  <!-- CHAT AREA -->
  <div id="chat" class="flex-1 overflow-y-auto px-6 py-6 space-y-4">

    <div class="text-center text-slate-400 mt-20">
      Ask anything to get started
    </div>

  </div>

  <!-- INPUT -->
  <div class="border-t p-4 flex gap-2">
    <input
      id="input"
      placeholder="Ask your homework question..."
      class="flex-1 border rounded-lg px-4 py-3 outline-none"
    />

    <button onclick="sendMessage()"
      class="bg-black text-white px-5 rounded-lg">
      Send
    </button>
  </div>

</div>

<script>

let messages = [];

function newChat(){
  document.getElementById("chat").innerHTML = `
    <div class="text-center text-slate-400 mt-20">
      New chat started
    </div>
  `;
}

function addMessage(content, type){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");

  div.className =
    type === "user"
      ? "flex justify-end"
      : "flex justify-start";

  div.innerHTML = `
    <div class="
      max-w-xl px-4 py-3 rounded-xl
      ${type === "user"
        ? "bg-black text-white"
        : "bg-slate-100 text-slate-900"}
    ">
      ${content}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value;

  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Thinking...", "ai");

  const res = await fetch("/api/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question: text })
  });

  const data = await res.json();

  document.querySelectorAll("#chat div")[document.querySelectorAll("#chat div").length - 1]
    .innerHTML = `
      <div class="max-w-xl px-4 py-3 rounded-xl bg-slate-100">
        ${data.answer}
      </div>
    `;
}

</script>

</body>
</html>
<!-- deploy -->
